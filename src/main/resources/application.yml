spring:
  application:
    name: barberia

  datasource:
    url: jdbc:mysql://localhost:3306/barberia_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

# server configuration
logging:
  level:
    org.springframework.security: DEBUG

server:
  port: 8080


