spring:
  application:
    name: barberia

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/barberia_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:mysql}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

# server configuration
logging:
  level:
    org.springframework.security: DEBUG

server:
  port: ${PORT:8080}

application:
  security:
